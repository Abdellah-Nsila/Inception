services:

  nginx:
    build:
      context: ./requirements/nginx
      args:
        DOMAIN_NAME: ${DOMAIN_NAME}
    image: "nginx"
    container_name: nginx
    restart: unless-stopped
    ports:
      - 443:443
    networks:
      - inception_net
    volumes:
      - wordpress_vol:/var/www/html

  wordpress:
    build: ./requirements/wordpress
    image: "wordpress"
    container_name: wordpress
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - inception_net
    volumes:
      - wordpress_vol:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy

  mariadb:
    build: ./requirements/mariadb
    image: "mariadb"
    container_name: mariadb
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - inception_net
    volumes:
      - mariadb_vol:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
      

networks:
  inception_net:
    name: inception_net

volumes:
  wordpress_vol:
    name: wordpress_vol
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/${USER}/data/wordpress'
  mariadb_vol:
    name: mariadb_vol
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/${USER}/data/mariadb'
