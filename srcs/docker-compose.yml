services:

  nginx:
    build: ./requirements/nginx
    image: nginx
    container_name: nginx
    restart: unless-stopped
    ports:
      - 443:443
    networks:
      - inception_net
    volumes:
      - wordpress_vol:var/www/html

  wordpress:
    build: ./requirements/wordpress
    image: wordpress
    container_name: wordpress
    restart: unless-stopped
    networks:
      - inception_net
    volumes:
      - wordpress_vol:var/www/html

  mariadb:
    build: ./requirements/mariadb
    image: mariadb
    container_name: mariadb
    restart: unless-stopped
    networks:
      - inception_net
    volumes:
      - mariadb_vol:var/lib/mysql

networks:
  inception_net:
    name: inception_net

volumes:
  wordpress_vol:
    name: wordpress_vol
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/${USER}/data/wordpress'
  mariadb_vol:
    name: mariadb_vol
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/${USER}/data/mariadb'
