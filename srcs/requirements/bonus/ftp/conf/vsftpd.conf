# Run standalone in the foreground so the container stays alive
listen=YES
background=NO

# Access privileges
anonymous_enable=NO
local_enable=YES
write_enable=YES

# Root landing zone
local_root=/var/www/html

# Strict Whitelist Control
userlist_enable=YES
userlist_deny=NO
userlist_file=/etc/vsftpd.userlist

# The Absolute Must-Have Alpine Fix (Prevents runtime crashes)
seccomp_sandbox=NO

# Data stream routing parameters
pasv_enable=YES
pasv_min_port=30000
pasv_max_port=30005
