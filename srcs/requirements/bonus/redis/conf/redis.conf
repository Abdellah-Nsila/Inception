# Listen on all network interfaces inside the container network
bind 0.0.0.0

# Port to run the service on
port 6379

# Disable protected mode so other containers on inception_net can connect
protected-mode no

# Define memory usage ceiling (e.g., max 256mb of RAM for caching)
maxmemory 256mb

# When memory fills up, remove the oldest, least-used keys automatically
maxmemory-policy allkeys-lru