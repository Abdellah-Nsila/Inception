# Mandatory events block
events {
    worker_connections 1024;
}

# Mandatory HTTP context wrapping the server
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name abnsila.42.fr;

        # Matching the exact path created by the initialization script
        ssl_certificate /etc/nginx/ssl/inception.crt;
        ssl_certificate_key /etc/nginx/ssl/inception.key;

        # Secure protocols mandated by Inception
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Webroot configurations
        root /var/www/html;
        index index.php index.html index.htm;

        location / {
            # Bypass the filesystem entirely for testing
            return 200 "Nginx is alive, fully secure, and talking over TLS!\n";
            default_type text/plain;
        }
    }
}