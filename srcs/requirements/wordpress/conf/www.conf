[www]

# Run as the default Alpine unprivileged user
user = nobody
group = nogroup

# Listen on all network interfaces on port 9000
listen = 9000

# Set up FPM process management
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

# By default, PHP-FPM strips docker-compose environment variables (like SQL_USER).
# Setting this to 'no' allows WordPress to read your database credentials!
clear_env = no